name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Validate n8n workflow JSON
        run: |
          for f in n8n_workflows/*.json; do
            python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done

      - name: Validate app config JSON
        run: python -c "import json; json.load(open('config/app_config.json'))"

      - name: Run unit tests
        run: pytest -v
